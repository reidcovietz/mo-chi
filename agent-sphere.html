<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>mo-chi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07080f; overflow:hidden; font-family:'Courier New',monospace; }
#canvas-wrap { position:fixed; inset:0; }

#title {
  position:fixed; top:22px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:5px; text-transform:uppercase;
  color:rgba(180,210,255,0.18); user-select:none; pointer-events:none;
}
#status {
  position:fixed; top:42px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:2px; color:rgba(120,210,130,0.55);
  min-width:280px; text-align:center; transition:opacity .5s; opacity:0;
  pointer-events:none;
}

#ws-dot {
  position:fixed; top:24px; right:26px; width:8px; height:8px;
  border-radius:50%; background:#444; transition:background .4s; cursor:default;
}

/* ── Brain debug (top-left internal log) ── */
#brain-debug {
  position:fixed; top:20px; left:22px;
  width:160px; pointer-events:none; z-index:10;
  display:flex; flex-direction:column; gap:1px;
}
.brain-evt {
  font-size:6.5px; font-family:'Courier New',monospace;
  letter-spacing:0.3px; line-height:1.3;
  opacity:0; animation:brain-in 0.1s forwards;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition:opacity 0.4s;
}
@keyframes brain-in { to { opacity:1; } }
.brain-evt.t-read    { color:rgba(100,160,255,0.38); }
.brain-evt.t-write   { color:rgba(255,175,60,0.48);  }
.brain-evt.t-evolve  { color:rgba(190,100,255,0.48); }
.brain-evt.t-web     { color:rgba(80,220,130,0.44);  }
.brain-evt.t-curious { color:rgba(80,210,240,0.44);  }
.brain-evt.t-memory  { color:rgba(200,200,200,0.26); }
.brain-evt.t-filter  { color:rgba(200,200,100,0.38); }

/* ── Proposer cards (left) ── */
#proposers {
  position:fixed; left:22px; top:58px; bottom:96px; width:210px;
  display:flex; flex-direction:column; gap:7px;
}
.prop-card {
  flex:1; border-radius:9px; padding:9px 11px;
  background:rgba(255,255,255,0.022);
  display:flex; flex-direction:column; gap:5px; overflow:hidden;
  border-left:2px solid transparent;
  transition:border-color .4s;
}
.prop-header { display:flex; align-items:center; gap:7px; }
.prop-indicator {
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
  transition:box-shadow .3s;
}
.prop-label { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; }
.prop-text  {
  font-size:10.5px; line-height:1.65; overflow-y:auto; flex:1;
  white-space:pre-wrap; word-break:break-word; scrollbar-width:none;
}
.prop-analytical { border-color:rgba(80,140,255,.45); }
.prop-analytical .prop-indicator { background:#508cff; }
.prop-analytical .prop-label { color:rgba(100,160,255,.7); }
.prop-analytical .prop-text  { color:rgba(130,175,255,.6); }
.prop-creative { border-color:rgba(200,80,255,.45); }
.prop-creative .prop-indicator { background:#c850ff; }
.prop-creative .prop-label { color:rgba(210,110,255,.7); }
.prop-creative .prop-text  { color:rgba(210,150,255,.6); }
.prop-critic { border-color:rgba(255,140,50,.45); }
.prop-critic .prop-indicator { background:#ff8c32; }
.prop-critic .prop-label { color:rgba(255,160,80,.7); }
.prop-critic .prop-text  { color:rgba(255,185,125,.6); }
.prop-visionary { border-color:rgba(30,210,240,.45); }
.prop-visionary .prop-indicator { background:#1ed2f0; }
.prop-visionary .prop-label { color:rgba(60,220,245,.7); }
.prop-visionary .prop-text  { color:rgba(120,220,240,.6); }
.prop-contrarian { border-color:rgba(255,55,85,.45); }
.prop-contrarian .prop-indicator { background:#ff3755; }
.prop-contrarian .prop-label { color:rgba(255,90,110,.7); }
.prop-contrarian .prop-text  { color:rgba(255,140,155,.6); }
.prop-reasoning { border-color:rgba(240,200,30,.45); }
.prop-reasoning .prop-indicator { background:#f0c81e; }
.prop-reasoning .prop-label { color:rgba(240,210,60,.7); }
.prop-reasoning .prop-text  { color:rgba(240,220,130,.6); }
.prop-pragmatist { border-color:rgba(40,220,160,.45); }
.prop-pragmatist .prop-indicator { background:#28dca0; }
.prop-pragmatist .prop-label { color:rgba(60,225,170,.7); }
.prop-pragmatist .prop-text  { color:rgba(120,230,190,.6); }
.prop-indicator.active {
  box-shadow:0 0 0 3px rgba(255,255,255,0.08), 0 0 8px currentColor;
}

/* ── Neural calculations panel (dedicated) ── */
#nn-panel {
  position:fixed; right:16px; bottom:-130px; width:188px;
  background:rgba(5,8,18,0.88); border:1px solid rgba(80,230,150,0.09);
  border-radius:8px; padding:8px 11px;
  display:flex; flex-direction:column; gap:2px;
  backdrop-filter:blur(10px);
  transition:bottom 0.45s cubic-bezier(0.16,1,0.3,1);
  z-index:15;
}
#nn-panel.visible { bottom:80px; }
#nn-panel-header {
  font-size:7px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(80,230,150,.28); margin-bottom:1px;
}
.nn-row { display:flex; align-items:center; gap:4px; }
.nn-label {
  font-size:7px; letter-spacing:1px; text-transform:uppercase;
  width:58px; flex-shrink:0; opacity:.42;
}
.nn-bar-wrap {
  flex:1; height:2px; background:rgba(255,255,255,.04); border-radius:2px; overflow:hidden;
}
.nn-bar { height:100%; border-radius:2px; transition:width .6s cubic-bezier(.16,1,.3,1); }
.nn-val { font-size:7px; width:20px; text-align:right; opacity:.38; flex-shrink:0; }
#nn-equation {
  font-size:7px; letter-spacing:.4px; margin-top:2px;
  color:rgba(80,230,150,.32); text-align:center;
  border-top:1px solid rgba(80,230,150,.06); padding-top:4px;
}

/* ── Input bar ── */
#ui {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  display:flex; gap:9px; z-index:10; transition:opacity .3s;
}
#prompt-input {
  width:360px; padding:11px 16px;
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:9px; color:#cce; font-size:13px;
  font-family:'Courier New',monospace; outline:none;
  transition:border-color .25s;
}
#prompt-input:focus { border-color:rgba(80,220,100,.38); }
#send-btn {
  padding:11px 22px; background:rgba(55,190,75,.1);
  border:1px solid rgba(55,190,75,.32); border-radius:9px;
  color:#7cf888; cursor:pointer; font-family:'Courier New',monospace;
  font-size:12px; letter-spacing:1px; transition:all .2s;
}
#send-btn:hover    { background:rgba(55,190,75,.2); }
#send-btn:disabled { opacity:.3; cursor:default; }

/* ── Result panel (slides up after aggregator done) ── */
#result-panel {
  position:fixed; left:50%; transform:translateX(-50%);
  bottom:-100%; width:min(740px,88vw); max-height:58vh;
  background:rgba(6,10,20,0.94); border:1px solid rgba(80,230,150,0.28);
  border-radius:14px; padding:18px 22px;
  display:flex; flex-direction:column; gap:10px;
  backdrop-filter:blur(16px);
  transition:bottom 0.55s cubic-bezier(0.16,1,0.3,1);
  z-index:20;
}
#result-panel.visible { bottom:18px; }
#result-header {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:8px; border-bottom:1px solid rgba(80,230,150,0.12);
}
#result-label {
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(80,230,150,0.65);
}
#result-meta { font-size:9px; letter-spacing:1.5px; color:rgba(255,255,255,0.18); flex:1; }
#result-actions { display:flex; align-items:center; gap:6px; }
.result-btn {
  font-size:8.5px; letter-spacing:1.8px; text-transform:uppercase;
  font-family:'Courier New',monospace; cursor:pointer;
  border-radius:6px; padding:5px 12px; line-height:1;
  transition:all .2s; white-space:nowrap;
}
#result-new-btn {
  color:rgba(80,230,150,.7); background:rgba(80,230,150,.06);
  border:1px solid rgba(80,230,150,.22);
}
#result-new-btn:hover { background:rgba(80,230,150,.13); color:rgba(80,230,150,1); }
#result-close-btn {
  font-size:13px; color:rgba(255,255,255,0.2); background:none;
  border:1px solid rgba(255,255,255,.08); border-radius:6px;
  cursor:pointer; padding:4px 8px; line-height:1; transition:all .2s;
  font-family:'Courier New',monospace;
}
#result-close-btn:hover { color:rgba(255,255,255,.6); border-color:rgba(255,255,255,.2); }
#result-text {
  font-size:13.5px; line-height:1.8; overflow-y:auto; flex:1;
  white-space:pre-wrap; word-break:break-word;
  color:rgba(190,235,210,0.88);
  scrollbar-width:thin; scrollbar-color:rgba(80,230,150,0.15) transparent;
}
#result-sources {
  border-top:1px solid rgba(255,255,255,0.06);
  padding-top:8px; display:none; gap:6px; flex-wrap:wrap;
}
#result-sources.visible { display:flex; }
.source-chip {
  font-size:8.5px; letter-spacing:1.5px; text-transform:uppercase;
  padding:3px 8px; border-radius:4px; border:1px solid transparent; opacity:0.6;
}
/* ── Mobile agent strip (replaces side panels on small screens) ── */
#mobile-agents { display:none; }

@media (max-width: 768px) {
  /* Hide desktop side panels — sphere IS the show on mobile */
  #proposers { display:none; }

  /* Compact title */
  #title { font-size:8px; letter-spacing:3px; top:14px; }

  /* Status line sits just below title */
  #status { top:30px; font-size:9px; min-width:180px; }

  /* WS dot */
  #ws-dot { top:18px; right:14px; }

  /* Agent strip — row of color dots below status */
  #mobile-agents {
    display:flex;
    position:fixed;
    top:50px; left:50%; transform:translateX(-50%);
    gap:9px; align-items:center;
    background:rgba(7,8,15,0.55);
    padding:5px 13px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.05);
    backdrop-filter:blur(8px);
    z-index:5;
    pointer-events:none;
  }
  .mob-dot {
    width:6px; height:6px; border-radius:50%;
    opacity:0.2;
    transition:opacity .3s, transform .25s;
    flex-shrink:0;
  }
  .mob-dot.active { opacity:1; transform:scale(1.5); }

  /* Input bar — full width, docked to bottom, safe-area aware */
  #ui {
    left:0; right:0; bottom:0;
    transform:none;
    width:100%;
    display:flex;
    padding:10px 14px;
    padding-bottom:max(12px, env(safe-area-inset-bottom));
    background:rgba(7,8,15,0.9);
    backdrop-filter:blur(16px);
    border-top:1px solid rgba(255,255,255,0.06);
  }
  #prompt-input {
    flex:1;
    width:auto;
    min-width:0;
    font-size:16px; /* prevent iOS zoom on focus */
  }
  #send-btn { padding:11px 18px; font-size:11px; }
}
</style>
</head>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07080f);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 1.5, 9.5);

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.055;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.35;
controls.enablePan       = false;
controls.minDistance     = 2;
controls.maxDistance     = 20;
let autoRotateTimer = null;
controls.addEventListener('start', () => {
  controls.autoRotate = false;
  if (autoRotateTimer) clearTimeout(autoRotateTimer);
});
controls.addEventListener('end', () => {
  if (autoRotateTimer) clearTimeout(autoRotateTimer);
  autoRotateTimer = setTimeout(() => { controls.autoRotate = true; }, 5000);
});

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.12));
scene.add(new THREE.HemisphereLight(0x223366, 0x000000, 0.35));

// ── Post-processing (bloom) ───────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  0.55,   // strength — kept low so glow is tight, not diffused
  0.28,   // radius  — small halo, not a screen-wide blue wash
  0.28    // threshold — dormant nodes stay completely unlit
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ── Geodesic sphere builder ───────────────────────────────────────────────────
function buildGeodesic(radius, subdivisions, noiseMag = 0.09) {
  const phi = (1 + Math.sqrt(5)) / 2;
  let verts = [
    [-1,phi,0],[1,phi,0],[-1,-phi,0],[1,-phi,0],
    [0,-1,phi],[0,1,phi],[0,-1,-phi],[0,1,-phi],
    [phi,0,-1],[phi,0,1],[-phi,0,-1],[-phi,0,1]
  ].map(([x,y,z]) => {
    const l = Math.sqrt(x*x+y*y+z*z);
    return new THREE.Vector3(x/l, y/l, z/l);
  });

  let faces = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
  ];

  const midCache = new Map();
  function getMid(a, b) {
    const key = Math.min(a,b)*10000 + Math.max(a,b);
    if (midCache.has(key)) return midCache.get(key);
    const m = verts[a].clone().add(verts[b]).normalize();
    verts.push(m);
    midCache.set(key, verts.length - 1);
    return verts.length - 1;
  }

  for (let s = 0; s < subdivisions; s++) {
    const next = [];
    for (const [a,b,c] of faces) {
      const ab = getMid(a,b), bc = getMid(b,c), ca = getMid(c,a);
      next.push([a,ab,ca],[b,bc,ab],[c,ca,bc],[ab,bc,ca]);
    }
    faces = next;
  }

  // Organic radial noise — each vertex perturbed slightly along its normal.
  // Nearby vertices share no correlation intentionally, giving a lumpy,
  // natural feel rather than a smooth mathematical shape.
  verts = verts.map(v => {
    const r = radius * (1 + (Math.random() - 0.5) * 2 * noiseMag);
    return v.clone().multiplyScalar(r);
  });

  // Extract unique edges
  const edgeSet = new Set();
  const edges = [];
  for (const [a,b,c] of faces) {
    [[a,b],[b,c],[c,a]].forEach(([i,j]) => {
      const key = Math.min(i,j)*100000 + Math.max(i,j);
      if (!edgeSet.has(key)) { edgeSet.add(key); edges.push([i,j]); }
    });
  }

  return { verts, edges };
}

const SPHERE_R = 3.2;
const { verts, edges } = buildGeodesic(SPHERE_R, 2, 0.09);
// 162 verts, 480 edges

// ── Per-agent emissive colours ────────────────────────────────────────────────
const AGENT_COLOR = {
  analytical:  new THREE.Color(0.28, 0.52, 1.00),   // blue   — Groq llama-3.1-8b
  creative:    new THREE.Color(0.76, 0.28, 1.00),   // purple — Groq gemma2-9b
  critic:      new THREE.Color(1.00, 0.52, 0.18),   // orange — Groq gemma2-9b
  visionary:   new THREE.Color(0.10, 0.82, 0.94),   // cyan   — OpenRouter mistral-7b
  contrarian:  new THREE.Color(1.00, 0.18, 0.32),   // red    — Groq llama3-8b
  reasoning:   new THREE.Color(0.94, 0.78, 0.10),   // yellow — Groq llama-3.1-8b
  pragmatist:  new THREE.Color(0.14, 0.86, 0.62),   // teal   — Groq gemma2-9b
  aggregator:  new THREE.Color(0.28, 0.90, 0.55),   // green  — Groq llama-3.3-70b (agg)
  research:    new THREE.Color(0.88, 0.93, 1.00),   // silver-white — web research
};

// ── Neural Network ────────────────────────────────────────────────────────────
// Precompute adjacency lists so each neuron knows its connected edges + neighbours
const adjacency = verts.map(() => []);
edges.forEach(([a, b], ei) => {
  adjacency[a].push({ ei, nb: b });
  adjacency[b].push({ ei, nb: a });
});

// Learnable parameters — random initialisation
const edgeW = new Float32Array(edges.length);  // weight  wᵢ  per edge
const nodeB = new Float32Array(verts.length);  // bias    bᵢ  per neuron
edges.forEach((_, i) => { edgeW[i] = (Math.random() - 0.5) * 1.0; });
verts.forEach((_, i)  => { nodeB[i] = (Math.random() - 0.5) * 0.25; });

const act    = new Float32Array(verts.length); // activation a[i] for every neuron
const σ      = x => Math.tanh(x);             // smooth, bounded [-1, 1]
const INPUT_N = 28;                            // first N nodes form the input layer

// Encode prompt text → input-layer activations.
// Characters are normalised ASCII → [-1, 1]; the last 4 slots carry structural
// features (length, words, questions, exclamations) so different prompts always
// produce measurably different activation patterns across the network.
function encodePrompt(text) {
  const inp = new Float32Array(verts.length);
  for (let i = 0; i < Math.min(text.length, INPUT_N - 4); i++) {
    inp[i] = (text.charCodeAt(i) / 127) * 2 - 1;
  }
  inp[INPUT_N - 4] = Math.tanh(text.length / 80);
  inp[INPUT_N - 3] = Math.tanh(text.split(' ').length / 20);
  inp[INPUT_N - 2] = Math.tanh((text.match(/\?/g) || []).length);
  inp[INPUT_N - 1] = Math.tanh((text.match(/!/g)  || []).length);
  return inp;
}

// One forward pass: a[i] = σ( Σ wᵢⱼ · a[j] + b[i] )  for all i ≥ INPUT_N.
// Input neurons are clamped to their encoded values each pass.
function forwardPass(inp) {
  const next = new Float32Array(verts.length);
  for (let i = 0; i < INPUT_N; i++) next[i] = inp[i];
  for (let i = INPUT_N; i < verts.length; i++) {
    let sum = nodeB[i];
    for (const { ei, nb } of adjacency[i]) sum += edgeW[ei] * act[nb];
    next[i] = σ(sum);
  }
  act.set(next);
}

// Hebbian weight update after each completed run:
//   fire together → wire together, plus weight decay for stability.
function learnStep(lr = 0.018) {
  edges.forEach(([a, b], i) => {
    edgeW[i] += lr * act[a] * act[b];
    edgeW[i] *= 0.995;
    edgeW[i]  = Math.max(-2, Math.min(2, edgeW[i]));
  });
}

// Real token pulse — spikes to 1.0 on each token received, decays naturally.
// This is the ONLY signal driving glow intensity — no simulation, no fake math.
const agentTokenPulse = {};

// Tracks which layer-1 agents are currently running — drives status line honestly
const activeAgents = new Set();

let nnActive = false, nnTimer = 0, nnInp = new Float32Array(verts.length);
const NN_DT  = 0.07;

function startNN(text) {
  nnInp = encodePrompt(text);
  act.fill(0);
  for (let i = 0; i < INPUT_N; i++) act[i] = nnInp[i];
  // Pre-warm: propagate through the full network so activations are non-zero
  // by the time the first agent_start event arrives from the server.
  for (let r = 0; r < 10; r++) forwardPass(nnInp);
  nnActive = true;
  nnTimer  = 0;
}

function stopNN() { learnStep(); nnActive = false; }

// ── Node → agent mapping (proportional to model parameter count) ──────────────

// Computed fresh each send — maps the input box's screen position into world space
// so the orb appears to launch from the text field itself.
function getPromptStart() {
  const el   = document.getElementById('prompt-input');
  const rect = el.getBoundingClientRect();
  const nx   = ((rect.left + rect.width  / 2) / innerWidth)  *  2 - 1;
  const ny   = -((rect.top  + rect.height / 2) / innerHeight) *  2 + 1;
  const vec  = new THREE.Vector3(nx, ny, 0.5).unproject(camera);
  vec.sub(camera.position).normalize().multiplyScalar(7.5);
  return camera.position.clone().add(vec);
}
const PROMPT_END = new THREE.Vector3(0, 0, 0);

function activateNodes(nodeIds, agent) {
  nodeIds.forEach(id => {
    if (id < 0 || id >= nodeStates.length) return;
    const ns   = nodeStates[id];
    ns.glowActive = true;
    ns.fadingOut  = false;
    ns.agent      = agent;
    ns.glowT      = 0;
    ns.mat.emissive.copy(AGENT_COLOR[agent] ?? new THREE.Color(0.5, 0.5, 0.5));
  });
  setIndicator(agent, true);
}

function fadeNodes(agent) {
  nodeStates.forEach(ns => {
    if (ns.agent === agent) ns.fadingOut = true;
  });
  setIndicator(agent, false);
}

function resetAll() {
  nodeStates.forEach(ns => {
    ns.glowT = 0; ns.glowActive = false; ns.fadingOut = false; ns.agent = null;
    ns.mat.emissive.copy(ns.baseColor);
    ns.mat.emissiveIntensity = DIM_GLOW;
    ns.mesh.scale.setScalar(1);
  });
  ['analytical','creative','critic','visionary','contrarian','reasoning','pragmatist','aggregator'].forEach(a => setIndicator(a, false));
}

function beginFly() {
  if (STATE === 'flying' || STATE === 'processing') return;
  STATE = 'flying'; elapsed = 0;
  resetAll();
  Object.keys(agentTokenPulse).forEach(k => delete agentTokenPulse[k]);
  PROMPT_START = getPromptStart();
  promptMesh.position.copy(PROMPT_START);
  promptMat.opacity = 1;
  promptMat.emissiveIntensity = 0.35;
  promptLight.intensity = 0.5;
  document.getElementById('send-btn').disabled = true;
  showStatus('transmitting…');
}

function beginFade() {
  STATE = 'fading'; elapsed = 0;
  stopNN();
  showStatus('complete');
  setTimeout(() => { document.getElementById('send-btn').disabled = false; }, FADE_DUR * 1000);
}

const AGENT_BAR_COLOR = {
  analytical: '#508cff', creative:  '#c850ff', critic:    '#ff8c32',
  visionary:  '#1ed2f0', contrarian:'#ff3755', reasoning: '#f0c81e',
  pragmatist: '#28dca0',
};

// Track actual tokens received per agent during the current run
const agentTokenCounts = {};

function trackToken(agent) {
  agentTokenCounts[agent] = (agentTokenCounts[agent] || 0) + 1;
}

function resetTokenCounts() {
  Object.keys(agentTokenCounts).forEach(k => delete agentTokenCounts[k]);
}

function computeNNReadout() {
  const agents = ['analytical','creative','critic','visionary','contrarian','reasoning','pragmatist'];
  const counts = agents.map(name => ({ name, value: agentTokenCounts[name] || 0 }));
  const maxVal = Math.max(...counts.map(c => c.value), 1);
  const activeCount  = counts.filter(c => c.value > 0).length;
  const totalTokens  = counts.reduce((s, c) => s + c.value, 0);
  const utilization  = Math.round(activeCount / agents.length * 100);

  const panel  = document.getElementById('nn-panel');
  const eqEl   = document.getElementById('nn-equation');
  Array.from(panel.children).forEach(c => {
    if (c.id !== 'nn-panel-header' && c.id !== 'nn-equation') c.remove();
  });

  counts.forEach(({ name, value }) => {
    const pct    = (value / maxVal) * 100;
    const color  = AGENT_BAR_COLOR[name] || '#888';
    const failed = value === 0;
    const row    = document.createElement('div');
    row.className = 'nn-row';
    row.innerHTML = `
      <span class="nn-label" style="color:${failed ? 'rgba(255,80,80,.4)' : color}">${name}${failed ? ' ✗' : ''}</span>
      <div class="nn-bar-wrap">
        <div class="nn-bar" style="width:${pct.toFixed(1)}%;background:${color}${failed ? '33' : ''}"></div>
      </div>
      <span class="nn-val" style="color:${failed ? 'rgba(255,80,80,.4)' : ''}">${value}</span>`;
    panel.insertBefore(row, eqEl);
  });

  eqEl.textContent = `${activeCount}/${agents.length} agents · ${totalTokens} tokens · ${utilization}% network`;
  panel.classList.add('visible');
}

function clearNNReadout() {
  document.getElementById('nn-panel').classList.remove('visible');
  resetTokenCounts();
}

// ── Session chain (radial branching from sphere) ──────────────────────────────
const allResponseMeshes = [];
const raycaster = new THREE.Raycaster();
const mouse2d   = new THREE.Vector2();
const archivedSessions = [];

let curSession = null; // { group, connLine, lastRMesh, dir, perp1, perp2, exchanges }

const NODE_GAP     = 1.05;  // distance between exchanges along branch direction
const BRANCH_START = 0.55;  // extra clearance beyond sphere surface for first node

// Radial directions each session branches toward — spread around upper hemisphere
const SESSION_DIRS = [
  new THREE.Vector3(-0.65,  0.75,  0.10),
  new THREE.Vector3( 0.65,  0.75, -0.10),
  new THREE.Vector3( 0.00,  1.00,  0.20),
  new THREE.Vector3(-0.80,  0.55,  0.20),
  new THREE.Vector3( 0.80,  0.55, -0.20),
  new THREE.Vector3(-0.30,  0.90, -0.30),
  new THREE.Vector3( 0.30,  0.90,  0.30),
].map(v => v.normalize());

// Find the actual geodesic node closest to a given direction — branches root here
function _nearestVert(dir) {
  const d = dir.clone().normalize();
  let best = -Infinity, bestV = verts[0];
  for (const v of verts) {
    const dot = d.dot(v.clone().normalize());
    if (dot > best) { best = dot; bestV = v; }
  }
  return bestV.clone();
}

function _ensureSession() {
  if (curSession) return;
  const idx    = archivedSessions.length;
  const hint   = SESSION_DIRS[idx % SESSION_DIRS.length];
  // Snap to the nearest real sphere node so the branch honestly roots there
  const anchorPos = _nearestVert(hint);
  const dir    = anchorPos.clone().normalize(); // branch grows outward from that node
  const arbUp  = Math.abs(dir.y) < 0.9 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(1, 0, 0);
  const perp1  = new THREE.Vector3().crossVectors(dir, arbUp).normalize();
  const perp2  = new THREE.Vector3().crossVectors(dir, perp1).normalize();
  curSession = { group: new THREE.Group(), connLine: null, lastRMesh: null, dir, perp1, perp2, exchanges: [], anchorPos };
  scene.add(curSession.group);
}

function addChainExchange(promptText, responseText) {
  _ensureSession();
  const idx = curSession.exchanges.length;
  curSession.exchanges.push({ prompt: promptText, response: responseText });

  const { dir, perp1, perp2, group } = curSession;

  // Distance along branch: start just beyond the actual anchor node's radius
  const stepVar  = NODE_GAP + (Math.random() - 0.5) * 0.28;
  const anchorR  = curSession.anchorPos.length(); // real node radius, not mathematical SPHERE_R
  const distBase = anchorR + BRANCH_START + idx * stepVar;
  const distR    = distBase + 0.38 + Math.random() * 0.16;

  // Organic jitter perpendicular to branch direction
  const j = () => (Math.random() - 0.5);
  const pJit = perp1.clone().multiplyScalar(j() * 0.22)
                     .add(perp2.clone().multiplyScalar(j() * 0.22));
  const rJit = perp1.clone().multiplyScalar(j() * 0.18)
                     .add(perp2.clone().multiplyScalar(j() * 0.18));

  const pPos = dir.clone().multiplyScalar(distBase).add(pJit);
  const rPos = dir.clone().multiplyScalar(distR).add(rJit);

  // Prompt node — blue-white, varied size
  const pRadius = 0.048 + Math.random() * 0.044;
  const pGeo    = new THREE.SphereGeometry(pRadius, 7 + Math.floor(Math.random() * 5), 7);
  const pEI     = 0.40 + Math.random() * 0.40;
  const pMat    = new THREE.MeshStandardMaterial({
    color:    new THREE.Color(0.08, 0.14, 0.32),
    emissive: new THREE.Color(0.36 + Math.random() * 0.20, 0.50 + Math.random() * 0.18, 1.0),
    emissiveIntensity: pEI,
    roughness: 0.20 + Math.random() * 0.24, metalness: 0.50 + Math.random() * 0.24,
    transparent: true, opacity: 0,
  });
  pMat._baseEI = pEI; pMat._baseOp = 1.0;
  const pMesh = new THREE.Mesh(pGeo, pMat);
  pMesh.position.copy(pPos);
  group.add(pMesh);

  // Response node — green, varied size
  const rRadius = 0.072 + Math.random() * 0.055;
  const rGeo    = new THREE.SphereGeometry(rRadius, 8 + Math.floor(Math.random() * 5), 8);
  const rEI     = 0.55 + Math.random() * 0.45;
  const rMat    = new THREE.MeshStandardMaterial({
    color:    new THREE.Color(0.04, 0.20, 0.11),
    emissive: AGENT_COLOR.aggregator.clone(),
    emissiveIntensity: rEI,
    roughness: 0.18 + Math.random() * 0.22, metalness: 0.58 + Math.random() * 0.22,
    transparent: true, opacity: 0,
  });
  rMat._baseEI = rEI; rMat._baseOp = 1.0;
  const rMesh = new THREE.Mesh(rGeo, rMat);
  rMesh.position.copy(rPos);
  group.add(rMesh);
  allResponseMeshes.push({ mesh: rMesh, fullText: responseText, session: curSession });

  // Inner connector (prompt → response)
  const innerLineMat = new THREE.LineBasicMaterial({ color: 0x2a4880, transparent: true, opacity: 0 });
  innerLineMat._baseOp = 0.52;
  const innerLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([pPos, rPos]), innerLineMat);
  group.add(innerLine);

  // Chain connector (previous response → this prompt)
  if (curSession.lastRMesh) {
    const chainLineMat = new THREE.LineBasicMaterial({ color: 0x152030, transparent: true, opacity: 0 });
    chainLineMat._baseOp = 0.28;
    const chainLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([curSession.lastRMesh.position.clone(), pPos]),
      chainLineMat);
    group.add(chainLine);
    _fadeIn(chainLineMat, 0.28, 950);
  }

  // Root connector: from the actual sphere node → first prompt node
  if (idx === 0) {
    const connMat = new THREE.LineBasicMaterial({ color: 0x2a4060, transparent: true, opacity: 0 });
    connMat._baseOp = 0.36;
    curSession.connLine = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([curSession.anchorPos, pPos]), connMat);
    scene.add(curSession.connLine);
    _fadeIn(connMat, 0.36, 1100);
  }

  curSession.lastRMesh = rMesh;
  _fadeIn(pMat, 1.0, 700);
  _fadeIn(rMat, 1.0, 700);
  _fadeIn(innerLineMat, 0.52, 750);
}

function _fadeIn(mat, targetOpacity, durationMs) {
  const start = performance.now();
  function tick() {
    const t = Math.min((performance.now() - start) / durationMs, 1);
    mat.opacity = t * targetOpacity;
    if (t < 1) requestAnimationFrame(tick);
    else if (targetOpacity >= 1.0) mat.transparent = false;
  }
  tick();
}

// ── Branch brightness (active = full, archived = dimmed by exchange count) ──
function _smoothMat(mat, targetEI, targetOp, ms) {
  const startEI = targetEI !== null ? mat.emissiveIntensity : null;
  const startOp = targetOp !== null ? mat.opacity           : null;
  const t0 = performance.now();
  (function tick() {
    const t = Math.min((performance.now() - t0) / ms, 1);
    const e = t * t * (3 - 2 * t); // smoothstep
    if (startEI !== null) mat.emissiveIntensity = startEI + (targetEI - startEI) * e;
    if (startOp !== null) mat.opacity           = startOp + (targetOp  - startOp)  * e;
    if (t < 1) requestAnimationFrame(tick);
  })();
}

function _dimFactor(session) {
  // Larger branches retain more glow — meaningful data stays visible
  const n = session.exchanges.length;
  return Math.min(0.60, 0.22 + n * 0.09);
}

function setSessionBrightness(session, factor, ms = 700) {
  session.group.traverse(obj => {
    if (!obj.material) return;
    const mat = obj.material;
    const targetEI = mat._baseEI !== undefined ? mat._baseEI * factor : null;
    const targetOp = mat._baseOp !== undefined ? mat._baseOp * Math.max(factor, 0.15) : null;
    _smoothMat(mat, targetEI, targetOp, ms);
  });
  if (session.connLine) {
    const mat = session.connLine.material;
    if (mat._baseOp !== undefined)
      _smoothMat(mat, null, mat._baseOp * Math.max(factor, 0.15), ms);
  }
}

function archiveSession() {
  if (curSession && curSession.exchanges.length > 0) {
    const s = curSession;
    archivedSessions.push(s);
    setSessionBrightness(s, _dimFactor(s), 900);
  }
  curSession = null;
  // Tell server to reset session history — new session starts fresh
  if (wsConnected && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'new_session' }));
  }
}

function clearChain() {
  [...archivedSessions, curSession].filter(Boolean).forEach(s => {
    while (s.group.children.length > 0) {
      const obj = s.group.children[0];
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material)  obj.material.dispose();
      s.group.remove(obj);
    }
    scene.remove(s.group);
    if (s.connLine) scene.remove(s.connLine);
  });
  archivedSessions.length = 0;
  curSession = null;
  allResponseMeshes.length = 0;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null, wsConnected = false;

function connectWS() {
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${wsProto}//${location.host}/ws`);
  const dot = document.getElementById('ws-dot');

  ws.onopen  = () => { wsConnected = true;  dot.style.background = '#44ff88'; dot.title = 'connected';    document.getElementById('send-btn').disabled = false; };
  ws.onclose = () => { wsConnected = false; dot.style.background = '#ff4444'; dot.title = 'disconnected'; document.getElementById('send-btn').disabled = true;  setTimeout(connectWS, 3000); };
  ws.onerror = () => { wsConnected = false; dot.style.background = '#ff8800'; dot.title = 'error'; };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);

    switch (msg.event) {
      case 'prompt_received':
        clearPanels();
        clearNNReadout();
        activeAgents.clear();
        promptStartTime = Date.now();
        beginFly();
        break;

      case 'layer_start':
        // Don't show anything — wait for actual agent_start events
        break;

      case 'agent_start': {
        activateNodes(msg.node_ids, msg.agent);
        if (msg.layer === 0) {
          showStatus('searching web…');
        } else if (msg.layer === 1) {
          activeAgents.add(msg.agent);
          showStatus('calculating · ' + [...activeAgents].join(' · '));
        } else if (msg.layer === 2) {
          showStatus('calculating · aggregator');
        }
        break;
      }

      case 'research_results':
        searchSources = msg.results || [];
        break;

      case 'intent':
        // Don't show anything yet — wait for real events
        break;

      case 'memory_loaded':
        showStatus(`memory · ${msg.count} past exchange${msg.count !== 1 ? 's' : ''} recalled`);
        break;

      case 'token':
        appendToken(msg.agent, msg.text);
        if (msg.layer === 1) trackToken(msg.agent);
        agentTokenPulse[msg.agent] = 1.0;  // real token — spike glow
        break;

      case 'agent_complete':
        if (msg.layer === 0) {
          fadeNodes('research');
        } else if (msg.layer === 1) {
          fadeNodes(msg.agent);
          activeAgents.delete(msg.agent);
          if (activeAgents.size > 0)
            showStatus('calculating · ' + [...activeAgents].join(' · '));
          // When all done, aggregator agent_start will update the status
        }
        break;

      case 'layer_done':
        // Status handled by agent_start/agent_complete — no action needed
        break;

      case 'agent_done':
        lastFullResponse = msg.full_text;
        beginFade();
        computeNNReadout();
        addChainExchange(lastPrompt, msg.full_text);
        if (msg.follow_up) {
          const sug = document.getElementById('result-followup-suggestion');
          sug.textContent = msg.follow_up;
          sug.classList.add('visible');
        }
        setTimeout(() => showResultPanel(msg.full_text, curSession), 600);
        break;

      case 'brain_debug':
        _brainLog(msg.action, msg.file, msg.detail);
        break;

      case 'error':
        showStatus('error · ' + msg.message);
        document.getElementById('send-btn').disabled = false;
        STATE = 'idle';
        break;
    }
  };
}
connectWS();

renderer.domElement.addEventListener('click', e => {
  if (allResponseMeshes.length === 0) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse2d.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse2d.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse2d, camera);
  const hits = raycaster.intersectObjects(allResponseMeshes.map(c => c.mesh));
  if (hits.length > 0) {
    const found = allResponseMeshes.find(c => c.mesh === hits[0].object);
    if (found) showResultPanel(found.fullText, found.session);
  }
});

// ── Send / demo ───────────────────────────────────────────────────────────────
function startAnimation() {
  const input = document.getElementById('prompt-input');
  const text  = input.value.trim();
  if (!text) return;
  lastPrompt = text;

  if (wsConnected && ws.readyState === WebSocket.OPEN) {
    input.value = '';          // text "enters the orb" — clear immediately
    ws.send(JSON.stringify({ type: 'prompt', text }));
    return;
  }

  showStatus('not connected · retrying…');
  setTimeout(hideStatus, 2500);
}

// ── Edge colour update ────────────────────────────────────────────────────────
function updateEdges() {
  const col = edgeGeo.attributes.color.array;
  edges.forEach(([a, b], i) => {
    const A = nodeStates[a], B = nodeStates[b];
    let r, g, bl;

    if (A.glowActive && B.glowActive && A.agent && A.agent === B.agent) {
      const c = AGENT_COLOR[A.agent];
      const t = Math.min(A.glowT, B.glowT);
      // Weight magnitude modulates how brightly this synapse conducts signal.
      // Strong weights (|w|→2) are 30% brighter than weak weights (|w|→0).
      const wScale = 0.7 + 0.3 * Math.min(Math.abs(edgeW[i]) / 1.5, 1);
      const k = Math.min(t / 0.6, 1) * 0.38 * wScale;
      r = c.r * k; g = c.g * k; bl = c.b * k;
    } else {
      [r, g, bl] = DORMANT_EDGE;
    }
    col.set([r, g, bl, r, g, bl], i * 6);
  });
  edgeGeo.attributes.color.needsUpdate = true;
}

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  controls.update();

  if (STATE !== 'idle') elapsed += dt;

  // Decay real token pulses — each spike lasts ~0.3s then fades
  Object.keys(agentTokenPulse).forEach(a => {
    agentTokenPulse[a] = Math.max(0, agentTokenPulse[a] - dt * 3.5);
  });

  // Hebbian weight updates still run (drives edge brightness via edgeW)
  if (nnActive) {
    nnTimer += dt;
    if (nnTimer >= NN_DT) { forwardPass(nnInp); nnTimer = 0; }
  }

  // Flying: prompt sphere moves from outside to center
  if (STATE === 'flying') {
    const prog = Math.min(elapsed / FLY_DUR, 1);
    const e = easeInOut(prog);
    promptMesh.position.lerpVectors(PROMPT_START, PROMPT_END, e);
    promptLight.position.copy(promptMesh.position);
    promptMesh.scale.setScalar(1 - e * 0.45);
    if (prog >= 1) { STATE = 'processing'; elapsed = 0; }
  }

  // Processing: prompt sphere sits quietly at center — models have it now
  if (STATE === 'processing') {
    const pulse = 0.30 + 0.04 * Math.sin(elapsed * 2.8);  // gentle, slow
    promptMesh.scale.setScalar(pulse);
    promptMat.emissiveIntensity = 0.08 + 0.04 * Math.sin(elapsed * 2.8);
    promptLight.intensity = 0.05 + 0.03 * Math.sin(elapsed * 2.8);
    promptLight.position.copy(PROMPT_END);
  }

  // Fading: everything winds down
  if (STATE === 'fading') {
    const f = Math.max(0, 1 - elapsed / FADE_DUR);
    promptMat.opacity           = f;
    promptMat.emissiveIntensity = f * 0.5;
    promptLight.intensity       = f * 0.8;
    if (elapsed >= FADE_DUR) {
      STATE = 'idle'; elapsed = 0;
      resetAll();
      hideStatus();
      promptMat.opacity = 0;
      promptLight.intensity = 0;
    }
  }

  // Node glow animation — intensity driven by real neuron activation a[i]
  const fadeScale = STATE === 'fading' ? Math.max(0, 1 - elapsed / FADE_DUR) : 1;

  nodeStates.forEach((ns, ni) => {
    if (!ns.glowActive) {
      // Fade back to dim baseline (not full dark) — node always shows its agent colour
      ns.mat.emissive.copy(ns.baseColor);
      ns.mat.emissiveIntensity += (DIM_GLOW - ns.mat.emissiveIntensity) * Math.min(dt * 5, 1);
      if (ns.mesh.scale.x > 1) ns.mesh.scale.setScalar(1);
      return;
    }

    if (ns.fadingOut) {
      ns.glowT = Math.max(0, ns.glowT - dt * 1.6);
      if (ns.glowT <= 0) {
        ns.glowActive = false;
        ns.agent = null;
        ns.mat.emissive.copy(ns.baseColor);
        ns.mat.emissiveIntensity = DIM_GLOW;
        ns.mesh.scale.setScalar(1);
        return;
      }
    } else {
      ns.glowT += dt;
    }

    const progress  = Math.min(ns.glowT / 0.55, 1);
    const pulse     = 0.72 + 0.32 * Math.sin(ns.glowT * 3.8 + ns.phaseOff);
    // Intensity driven purely by real token throughput — 0 when LLM is silent
    const tokenPulse = agentTokenPulse[ns.agent] || 0;
    const neuronAct  = 0.20 + 0.80 * tokenPulse;
    ns.mat.emissiveIntensity = DIM_GLOW + progress * pulse * neuronAct * fadeScale;
    ns.mesh.scale.setScalar(1 + progress * tokenPulse * 0.28);
  });

  updateEdges();
  composer.render();
}

animate();

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ── Input ─────────────────────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', startAnimation);
document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startAnimation();
});
</script>
</body>
