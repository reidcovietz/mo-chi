<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>mo-chi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07080f; overflow:hidden; font-family:'Courier New',monospace; }
#canvas-wrap { position:fixed; inset:0; }

#title {
  position:fixed; top:22px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:5px; text-transform:uppercase;
  color:rgba(180,210,255,0.18); user-select:none; pointer-events:none;
}
#status {
  position:fixed; top:42px; left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:2px; color:rgba(120,210,130,0.55);
  min-width:280px; text-align:center; transition:opacity .5s; opacity:0;
  pointer-events:none;
}

#ws-dot {
  position:fixed; top:24px; right:26px; width:8px; height:8px;
  border-radius:50%; background:#444; transition:background .4s; cursor:default;
}

/* ── Proposer cards (left) ── */
#proposers {
  position:fixed; left:22px; top:58px; bottom:96px; width:210px;
  display:flex; flex-direction:column; gap:7px;
}
.prop-card {
  flex:1; border-radius:9px; padding:9px 11px;
  background:rgba(255,255,255,0.022);
  display:flex; flex-direction:column; gap:5px; overflow:hidden;
  border-left:2px solid transparent;
  transition:border-color .4s;
}
.prop-header { display:flex; align-items:center; gap:7px; }
.prop-indicator {
  width:6px; height:6px; border-radius:50%; flex-shrink:0;
  transition:box-shadow .3s;
}
.prop-label { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; }
.prop-text  {
  font-size:10.5px; line-height:1.65; overflow-y:auto; flex:1;
  white-space:pre-wrap; word-break:break-word; scrollbar-width:none;
}

/* agent accent colours */
.prop-analytical { border-color:rgba(80,140,255,.45); }
.prop-analytical .prop-indicator { background:#508cff; }
.prop-analytical .prop-label { color:rgba(100,160,255,.7); }
.prop-analytical .prop-text  { color:rgba(130,175,255,.6); }

.prop-creative { border-color:rgba(200,80,255,.45); }
.prop-creative .prop-indicator { background:#c850ff; }
.prop-creative .prop-label { color:rgba(210,110,255,.7); }
.prop-creative .prop-text  { color:rgba(210,150,255,.6); }

.prop-critic { border-color:rgba(255,140,50,.45); }
.prop-critic .prop-indicator { background:#ff8c32; }
.prop-critic .prop-label { color:rgba(255,160,80,.7); }
.prop-critic .prop-text  { color:rgba(255,185,125,.6); }

/* active pulse on indicator */
.prop-indicator.active {
  box-shadow:0 0 0 3px rgba(255,255,255,0.08), 0 0 8px currentColor;
}

/* ── Aggregator panel (right) ── */
#agg-panel {
  position:fixed; right:22px; top:58px; bottom:96px; width:230px;
  border-radius:9px; padding:9px 13px;
  background:rgba(255,255,255,0.022);
  border-left:2px solid rgba(80,230,150,.45);
  display:flex; flex-direction:column; gap:5px; overflow:hidden;
}
#agg-header { display:flex; align-items:center; gap:7px; }
#agg-indicator {
  width:6px; height:6px; border-radius:50%; background:#50e696;
  flex-shrink:0; transition:box-shadow .3s;
}
#agg-indicator.active {
  box-shadow:0 0 0 3px rgba(255,255,255,0.08), 0 0 8px #50e696;
}
#agg-label { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(80,230,150,.7); }
#agg-text  {
  font-size:11px; line-height:1.7; overflow-y:auto; flex:1;
  white-space:pre-wrap; word-break:break-word; scrollbar-width:none;
  color:rgba(150,230,190,.65);
}

/* ── Input bar ── */
#ui {
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  display:flex; gap:9px; z-index:10;
}
#prompt-input {
  width:360px; padding:11px 16px;
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:9px; color:#cce; font-size:13px;
  font-family:'Courier New',monospace; outline:none;
  transition:border-color .25s;
}
#prompt-input:focus { border-color:rgba(80,220,100,.38); }
#send-btn {
  padding:11px 22px; background:rgba(55,190,75,.1);
  border:1px solid rgba(55,190,75,.32); border-radius:9px;
  color:#7cf888; cursor:pointer; font-family:'Courier New',monospace;
  font-size:12px; letter-spacing:1px; transition:all .2s;
}
#send-btn:hover    { background:rgba(55,190,75,.2); }
#send-btn:disabled { opacity:.3; cursor:default; }
</style>
</head>
<body>

<div id="canvas-wrap"></div>
<div id="title">mo-chi · neural agent network</div>
<div id="status"></div>
<div id="ws-dot" title="connecting…"></div>

<!-- Layer 1 proposers -->
<div id="proposers">
  <div class="prop-card prop-analytical">
    <div class="prop-header">
      <span class="prop-indicator" id="ind-analytical"></span>
      <span class="prop-label">Analytical</span>
    </div>
    <div class="prop-text" id="text-analytical"></div>
  </div>
  <div class="prop-card prop-creative">
    <div class="prop-header">
      <span class="prop-indicator" id="ind-creative"></span>
      <span class="prop-label">Creative</span>
    </div>
    <div class="prop-text" id="text-creative"></div>
  </div>
  <div class="prop-card prop-critic">
    <div class="prop-header">
      <span class="prop-indicator" id="ind-critic"></span>
      <span class="prop-label">Critic</span>
    </div>
    <div class="prop-text" id="text-critic"></div>
  </div>
</div>

<!-- Layer 2 aggregator -->
<div id="agg-panel">
  <div id="agg-header">
    <span id="agg-indicator"></span>
    <span id="agg-label">Aggregator</span>
  </div>
  <div id="agg-text"></div>
</div>

<div id="ui">
  <input id="prompt-input" type="text" placeholder="Enter a prompt…" autocomplete="off"/>
  <button id="send-btn">SEND</button>
</div>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07080f);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 1.5, 9.5);

// ── Controls ──────────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.055;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.35;
controls.enablePan       = false;
controls.minDistance     = 5;
controls.maxDistance     = 20;
controls.addEventListener('start', () => { controls.autoRotate = false; });

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.12));
scene.add(new THREE.HemisphereLight(0x223366, 0x000000, 0.35));

// ── Post-processing (bloom) ───────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.35,   // strength
  0.55,   // radius
  0.24    // threshold — dormant nodes stay below this
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ── Geodesic sphere builder ───────────────────────────────────────────────────
function buildGeodesic(radius, subdivisions, noiseMag = 0.09) {
  const phi = (1 + Math.sqrt(5)) / 2;
  let verts = [
    [-1,phi,0],[1,phi,0],[-1,-phi,0],[1,-phi,0],
    [0,-1,phi],[0,1,phi],[0,-1,-phi],[0,1,-phi],
    [phi,0,-1],[phi,0,1],[-phi,0,-1],[-phi,0,1]
  ].map(([x,y,z]) => {
    const l = Math.sqrt(x*x+y*y+z*z);
    return new THREE.Vector3(x/l, y/l, z/l);
  });

  let faces = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1]
  ];

  const midCache = new Map();
  function getMid(a, b) {
    const key = Math.min(a,b)*10000 + Math.max(a,b);
    if (midCache.has(key)) return midCache.get(key);
    const m = verts[a].clone().add(verts[b]).normalize();
    verts.push(m);
    midCache.set(key, verts.length - 1);
    return verts.length - 1;
  }

  for (let s = 0; s < subdivisions; s++) {
    const next = [];
    for (const [a,b,c] of faces) {
      const ab = getMid(a,b), bc = getMid(b,c), ca = getMid(c,a);
      next.push([a,ab,ca],[b,bc,ab],[c,ca,bc],[ab,bc,ca]);
    }
    faces = next;
  }

  // Organic radial noise — each vertex perturbed slightly along its normal.
  // Nearby vertices share no correlation intentionally, giving a lumpy,
  // natural feel rather than a smooth mathematical shape.
  verts = verts.map(v => {
    const r = radius * (1 + (Math.random() - 0.5) * 2 * noiseMag);
    return v.clone().multiplyScalar(r);
  });

  // Extract unique edges
  const edgeSet = new Set();
  const edges = [];
  for (const [a,b,c] of faces) {
    [[a,b],[b,c],[c,a]].forEach(([i,j]) => {
      const key = Math.min(i,j)*100000 + Math.max(i,j);
      if (!edgeSet.has(key)) { edgeSet.add(key); edges.push([i,j]); }
    });
  }

  return { verts, edges };
}

const SPHERE_R = 3.2;
const { verts, edges } = buildGeodesic(SPHERE_R, 2, 0.09);
// 162 verts, 480 edges

// ── Per-agent emissive colours ────────────────────────────────────────────────
const AGENT_COLOR = {
  analytical: new THREE.Color(0.28, 0.52, 1.00),
  creative:   new THREE.Color(0.76, 0.28, 1.00),
  critic:     new THREE.Color(1.00, 0.52, 0.18),
  aggregator: new THREE.Color(0.28, 0.90, 0.55),
};

// ── Node meshes ───────────────────────────────────────────────────────────────
// Small spheres — only glow when their agent is actively running
const nodeGeo = new THREE.SphereGeometry(0.042, 6, 6);

const nodeStates = verts.map(pos => {
  const mat = new THREE.MeshStandardMaterial({
    color:             new THREE.Color(0x0b1521),
    emissive:          new THREE.Color(0, 0, 0),
    emissiveIntensity: 0,
    roughness:         0.45,
    metalness:         0.55,
  });
  const mesh = new THREE.Mesh(nodeGeo, mat);
  mesh.position.copy(pos);
  scene.add(mesh);
  return {
    mesh, mat,
    glowT:      0,
    glowActive: false,
    fadingOut:  false,
    agent:      null,
    phaseOff:   Math.random() * Math.PI * 2,
  };
});

// ── Edges (single LineSegments with per-vertex colour) ────────────────────────
const edgePosArr = new Float32Array(edges.length * 6);
const edgeColArr = new Float32Array(edges.length * 6);
const DORMANT_EDGE = [0.036, 0.055, 0.10];

edges.forEach(([a, b], i) => {
  edgePosArr.set([verts[a].x, verts[a].y, verts[a].z,
                  verts[b].x, verts[b].y, verts[b].z], i * 6);
  edgeColArr.set([...DORMANT_EDGE, ...DORMANT_EDGE], i * 6);
});

const edgeGeo = new THREE.BufferGeometry();
edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePosArr, 3));
edgeGeo.setAttribute('color',    new THREE.BufferAttribute(edgeColArr, 3));
const edgeLines = new THREE.LineSegments(
  edgeGeo, new THREE.LineBasicMaterial({ vertexColors: true })
);
scene.add(edgeLines);

// ── Prompt sphere ─────────────────────────────────────────────────────────────
const promptMat = new THREE.MeshStandardMaterial({
  color:             new THREE.Color(0.25, 1.0, 0.25),
  emissive:          new THREE.Color(0.18, 1.0, 0.18),
  emissiveIntensity: 0,
  transparent: true, opacity: 0,
  roughness: 0.08, metalness: 0.0,
});
const promptMesh = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), promptMat);
scene.add(promptMesh);

const promptLight = new THREE.PointLight(0x44ff44, 0, 10);
scene.add(promptLight);

const PROMPT_START = new THREE.Vector3(-8.8, 0.5, -0.8);
const PROMPT_END   = new THREE.Vector3(0, 0, 0);
promptMesh.position.copy(PROMPT_START);

// ── Animation state ───────────────────────────────────────────────────────────
let STATE   = 'idle'; // idle | flying | processing | fading
let elapsed = 0;
const FLY_DUR  = 1.15;
const FADE_DUR = 2.0;
const easeInOut = t => t < .5 ? 2*t*t : -1 + (4 - 2*t)*t;

function activateNodes(nodeIds, agent) {
  nodeIds.forEach(id => {
    if (id < 0 || id >= nodeStates.length) return;
    const ns   = nodeStates[id];
    ns.glowActive = true;
    ns.fadingOut  = false;
    ns.agent      = agent;
    ns.glowT      = 0;
    ns.mat.emissive.copy(AGENT_COLOR[agent] ?? new THREE.Color(0.5, 0.5, 0.5));
  });
  setIndicator(agent, true);
}

function fadeNodes(agent) {
  nodeStates.forEach(ns => {
    if (ns.agent === agent) ns.fadingOut = true;
  });
  setIndicator(agent, false);
}

function resetAll() {
  nodeStates.forEach(ns => {
    ns.glowT = 0; ns.glowActive = false; ns.fadingOut = false; ns.agent = null;
    ns.mat.emissiveIntensity = 0;
    ns.mesh.scale.setScalar(1);
  });
  ['analytical','creative','critic','aggregator'].forEach(a => setIndicator(a, false));
}

function beginFly() {
  if (STATE !== 'idle') return;
  STATE = 'flying'; elapsed = 0;
  resetAll();
  promptMesh.position.copy(PROMPT_START);
  promptMat.opacity = 1;
  promptMat.emissiveIntensity = 2.2;
  promptLight.intensity = 5;
  document.getElementById('send-btn').disabled = true;
  showStatus('transmitting…');
}

function beginFade() {
  STATE = 'fading'; elapsed = 0;
  showStatus('complete');
  setTimeout(() => { document.getElementById('send-btn').disabled = false; }, FADE_DUR * 1000);
}

// ── Panel helpers ─────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
function showStatus(msg) { statusEl.textContent = msg; statusEl.style.opacity = '1'; }
function hideStatus()    { statusEl.style.opacity = '0'; }

function setIndicator(agent, active) {
  const el = agent === 'aggregator'
    ? document.getElementById('agg-indicator')
    : document.getElementById(`ind-${agent}`);
  if (!el) return;
  if (active) el.classList.add('active');
  else        el.classList.remove('active');
}

function clearPanels() {
  ['analytical','creative','critic'].forEach(a => {
    const el = document.getElementById(`text-${a}`);
    if (el) el.textContent = '';
  });
  document.getElementById('agg-text').textContent = '';
}

function appendToken(agent, text) {
  if (agent === 'aggregator') {
    const el = document.getElementById('agg-text');
    el.textContent += text;
    el.scrollTop = el.scrollHeight;
  } else {
    const el = document.getElementById(`text-${agent}`);
    if (!el) return;
    el.textContent += text;
    el.scrollTop = el.scrollHeight;
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws = null, wsConnected = false;

function connectWS() {
  ws = new WebSocket('ws://localhost:8000/ws');
  const dot = document.getElementById('ws-dot');

  ws.onopen  = () => { wsConnected = true;  dot.style.background = '#44ff88'; dot.title = 'connected'; };
  ws.onclose = () => { wsConnected = false; dot.style.background = '#ff4444'; dot.title = 'disconnected'; setTimeout(connectWS, 3000); };
  ws.onerror = () => { wsConnected = false; dot.style.background = '#ff8800'; dot.title = 'error'; };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);

    switch (msg.event) {
      case 'prompt_received':
        clearPanels();
        beginFly();
        break;

      case 'layer_start':
        showStatus(`layer ${msg.layer} · ${(msg.agents || []).join(' · ')}`);
        break;

      case 'agent_start':
        // Only light up nodes while this LLM call is running
        activateNodes(msg.node_ids, msg.agent);
        break;

      case 'token':
        appendToken(msg.agent, msg.text);
        break;

      case 'agent_complete':
        // Layer 1 proposers fade when they finish; aggregator stays lit until agent_done
        if (msg.layer === 1) fadeNodes(msg.agent);
        break;

      case 'layer_done':
        if (msg.layer === 1) showStatus('layer 2 · aggregating…');
        break;

      case 'agent_done':
        beginFade();
        break;

      case 'error':
        showStatus('error · ' + msg.message);
        document.getElementById('send-btn').disabled = false;
        STATE = 'idle';
        break;
    }
  };
}
connectWS();

// ── Send / demo ───────────────────────────────────────────────────────────────
function startAnimation() {
  const text = document.getElementById('prompt-input').value.trim();
  if (!text) return;

  if (wsConnected && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'prompt', text }));
    return;
  }

  // Demo fallback (no server) — mimics the real timing
  clearPanels();
  beginFly();
  showStatus('demo mode · no server');

  const DEMO_AGENTS = [
    { name: 'analytical', nodes: Array.from({length:41}, (_,i) => i),      layer:1 },
    { name: 'creative',   nodes: Array.from({length:41}, (_,i) => i + 41), layer:1 },
    { name: 'critic',     nodes: Array.from({length:40}, (_,i) => i + 82), layer:1 },
    { name: 'aggregator', nodes: Array.from({length:40}, (_,i) => i + 122),layer:2 },
  ];

  const offset = FLY_DUR * 1000 + 150;
  // All 3 proposers activate simultaneously after fly-in
  setTimeout(() => {
    DEMO_AGENTS.slice(0,3).forEach(a => activateNodes(a.nodes, a.name));
    showStatus('layer 1 · analytical · creative · critic');
  }, offset);

  // Proposers finish at staggered times
  setTimeout(() => fadeNodes('analytical'), offset + 1400);
  setTimeout(() => fadeNodes('creative'),   offset + 1800);
  setTimeout(() => fadeNodes('critic'),     offset + 1600);

  // Aggregator starts after all proposers done
  setTimeout(() => {
    activateNodes(DEMO_AGENTS[3].nodes, 'aggregator');
    showStatus('layer 2 · aggregating…');
  }, offset + 2100);

  setTimeout(() => beginFade(), offset + 4800);
}

// ── Edge colour update ────────────────────────────────────────────────────────
function updateEdges() {
  const col = edgeGeo.attributes.color.array;
  edges.forEach(([a, b], i) => {
    const A = nodeStates[a], B = nodeStates[b];
    let r, g, bl;

    if (A.glowActive && B.glowActive && A.agent && A.agent === B.agent) {
      const c = AGENT_COLOR[A.agent];
      const t = Math.min(A.glowT, B.glowT);
      const k = Math.min(t / 0.6, 1) * 0.38;
      r = c.r * k; g = c.g * k; bl = c.b * k;
    } else {
      [r, g, bl] = DORMANT_EDGE;
    }
    col.set([r, g, bl, r, g, bl], i * 6);
  });
  edgeGeo.attributes.color.needsUpdate = true;
}

// ── Render loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  controls.update();

  if (STATE !== 'idle') elapsed += dt;

  // Flying: prompt sphere moves from outside to center
  if (STATE === 'flying') {
    const prog = Math.min(elapsed / FLY_DUR, 1);
    const e = easeInOut(prog);
    promptMesh.position.lerpVectors(PROMPT_START, PROMPT_END, e);
    promptLight.position.copy(promptMesh.position);
    promptMesh.scale.setScalar(1 - e * 0.45);
    if (prog >= 1) { STATE = 'processing'; elapsed = 0; }
  }

  // Processing: prompt sphere pulses at center
  if (STATE === 'processing') {
    const pulse = 0.48 + 0.18 * Math.sin(elapsed * 5.2);
    promptMesh.scale.setScalar(pulse);
    promptMat.emissiveIntensity = 1.6 + 0.55 * Math.sin(elapsed * 5.2);
    promptLight.intensity = 2.2 + 0.8 * Math.sin(elapsed * 5.2);
    promptLight.position.copy(PROMPT_END);
  }

  // Fading: everything winds down
  if (STATE === 'fading') {
    const f = Math.max(0, 1 - elapsed / FADE_DUR);
    promptMat.opacity           = f;
    promptMat.emissiveIntensity = f * 1.8;
    promptLight.intensity       = f * 2.2;
    if (elapsed >= FADE_DUR) {
      STATE = 'idle'; elapsed = 0;
      resetAll();
      hideStatus();
      promptMat.opacity = 0;
      promptLight.intensity = 0;
    }
  }

  // Node glow animation — only active while LLM is running
  const fadeScale = STATE === 'fading' ? Math.max(0, 1 - elapsed / FADE_DUR) : 1;

  nodeStates.forEach(ns => {
    if (!ns.glowActive) {
      if (ns.mat.emissiveIntensity > 0) {
        ns.mat.emissiveIntensity = Math.max(0, ns.mat.emissiveIntensity - dt * 3);
        if (ns.mat.emissiveIntensity <= 0) ns.mesh.scale.setScalar(1);
      }
      return;
    }

    if (ns.fadingOut) {
      ns.glowT = Math.max(0, ns.glowT - dt * 1.6);
      if (ns.glowT <= 0) {
        ns.glowActive = false;
        ns.agent = null;
        ns.mat.emissiveIntensity = 0;
        ns.mesh.scale.setScalar(1);
        return;
      }
    } else {
      ns.glowT += dt;
    }

    const progress  = Math.min(ns.glowT / 0.55, 1);
    const pulse     = 0.72 + 0.32 * Math.sin(ns.glowT * 3.8 + ns.phaseOff);
    ns.mat.emissiveIntensity = progress * pulse * fadeScale;
    ns.mesh.scale.setScalar(1 + progress * 0.22);
  });

  updateEdges();
  composer.render();
}

animate();

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// ── Input ─────────────────────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', startAnimation);
document.getElementById('prompt-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startAnimation();
});
</script>
</body>
</html>
